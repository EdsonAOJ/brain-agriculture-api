services:
  postgres:
    image: postgres:16
    container_name: brain_agriculture_postgres
    restart: always
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain_agriculture_db
    ports:
      - "5434:5432"
    volumes:
      - brain_agriculture_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain_agriculture_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brain_agriculture_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://brain:brain@postgres:5432/brain_agriculture_db?schema=public
    ports:
      - "3333:3333"
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: brain_agriculture_seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://brain:brain@postgres:5432/brain_agriculture_db?schema=public
    command: sh -c "npx prisma migrate deploy && npm run seed"
    profiles:
      - seed

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: brain_agriculture_test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://brain:brain@postgres:5432/brain_agriculture_test_db?schema=public
    command: sh -c "npx prisma migrate deploy && npm run test:e2e"
    profiles:
      - test

volumes:
  brain_agriculture_postgres_data: