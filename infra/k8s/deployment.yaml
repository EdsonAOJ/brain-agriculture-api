apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-agriculture-api
  namespace: brain-agriculture
  labels:
    app: brain-agriculture-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-agriculture-api
  template:
    metadata:
      labels:
        app: brain-agriculture-api
    spec:
      containers:
        - name: api
          image: REPLACE_WITH_REGISTRY/brain-agriculture-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3333
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3333'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: brain-agriculture-api-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3333
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
